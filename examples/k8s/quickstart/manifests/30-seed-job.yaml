apiVersion: batch/v1
kind: Job
metadata:
  name: quickstart-seed
  namespace: tidb-graphql-quickstart
  labels:
    app.kubernetes.io/name: tidb-graphql-seed
    app.kubernetes.io/instance: quickstart
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tidb-graphql-seed
        app.kubernetes.io/instance: quickstart
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: mysql:8
          env:
            - name: TIDB_HOST
              value: tidb-tidb
            - name: TIDB_USER
              valueFrom:
                secretKeyRef:
                  name: quickstart-db-credentials
                  key: database-user
            - name: TIDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quickstart-db-credentials
                  key: database-password
            - name: TIDB_DATABASE
              value: tidb_graphql_tutorial
          command:
            - /bin/sh
            - -ec
            - |
              export MYSQL_PWD="${TIDB_PASSWORD:-}"
              export MYSQL_HOST="${TIDB_HOST}"
              export MYSQL_USER="${TIDB_USER}"
              export MYSQL_DB="${TIDB_DATABASE:-tidb_graphql_tutorial}"
              until mysqladmin --protocol=TCP --host="${TIDB_HOST}" --port=4000 --user="${TIDB_USER}" ping --silent; do
                sleep 2
              done
              mysql --protocol=TCP --host="${TIDB_HOST}" --port=4000 --user="${TIDB_USER}" --execute="CREATE DATABASE IF NOT EXISTS \`${MYSQL_DB}\`;"
              mysql --protocol=TCP --host="${TIDB_HOST}" --port=4000 --user="${TIDB_USER}" --database="${MYSQL_DB}" < /seed/sample-data.sql
              mysql --protocol=TCP --host="${TIDB_HOST}" --port=4000 --user="${TIDB_USER}" --database="${MYSQL_DB}" < /seed/sample-data-vectors.sql
          volumeMounts:
            - name: tutorial-sql
              mountPath: /seed
              readOnly: true
      volumes:
        - name: tutorial-sql
          configMap:
            name: quickstart-tutorial-sql
