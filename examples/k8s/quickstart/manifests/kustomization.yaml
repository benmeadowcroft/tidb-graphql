apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tidb-graphql-quickstart

resources:
  - 00-namespace.yaml
  - 10-tidb-cluster.yaml
  - 20-tidb-graphql-config.yaml
  - 30-seed-job.yaml
  - 40-graphql.yaml

configMapGenerator:
  - name: quickstart-tutorial-sql
    files:
      - sql/sample-data.sql
      - sql/sample-data-vectors.sql
generatorOptions:
  disableNameSuffixHash: true
