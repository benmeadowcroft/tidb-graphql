apiVersion: apps/v1
kind: Deployment
metadata:
  name: tidb-graphql
  namespace: tidb-graphql-quickstart
  labels:
    app.kubernetes.io/name: tidb-graphql
    app.kubernetes.io/instance: quickstart
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tidb-graphql
      app.kubernetes.io/instance: quickstart
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tidb-graphql
        app.kubernetes.io/instance: quickstart
    spec:
      containers:
        - name: tidb-graphql
          image: ghcr.io/benmeadowcroft/tidb-graphql:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app-config
              mountPath: /etc/tidb-graphql
              readOnly: true
          env:
            - name: TIGQL_DATABASE_HOST
              value: tidb-tidb
            - name: TIGQL_DATABASE_PORT
              value: "4000"
            - name: TIGQL_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: quickstart-db-credentials
                  key: database-user
            - name: TIGQL_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quickstart-db-credentials
                  key: database-password
          args:
            - --config=/etc/tidb-graphql/tidb-graphql.yaml
      volumes:
        - name: app-config
          configMap:
            name: quickstart-tidb-graphql-config
---
apiVersion: v1
kind: Service
metadata:
  name: tidb-graphql
  namespace: tidb-graphql-quickstart
  labels:
    app.kubernetes.io/name: tidb-graphql
    app.kubernetes.io/instance: quickstart
spec:
  selector:
    app.kubernetes.io/name: tidb-graphql
    app.kubernetes.io/instance: quickstart
  ports:
    - name: http
      port: 8080
      targetPort: 8080
